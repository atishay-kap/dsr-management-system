<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSR Admin Panel</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">DSR</div>
      <div class="user-nav">
        <span>Admin - Atishay</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="admin-container">
      <div class="admin-top">
        <h2>Users</h2>
        <button class="action-btn task" onclick="openCreateUserDrawer()">
          + Create User
        </button>
      </div>

      <div class="user-grid" id="userGrid"></div>
      <div class="pagination-container" id="pagination"></div>

      <div id="adminDialog" class="admin-dialog">
        <div class="admin-dialog-backdrop" onclick="closeDialog()"></div>

        <div class="admin-dialog-card">
          <div class="dialog-header">
            <h3 id="dialogUserName">User</h3>
            <button class="dialog-close" onclick="closeDialog()">×</button>
          </div>

          <div class="dialog-content" id="dialogContent"></div>
        </div>
      </div>

      <div class="admin-detail-modal" id="adminDetailModal">
        <div class="admin-detail-backdrop" onclick="closeAdminDetail()"></div>

        <div class="admin-detail-card">
          <div class="detail-header">
            <h3 id="adminDetailTitle">Details</h3>
            <button onclick="closeAdminDetail()">×</button>
          </div>

          <div class="detail-content">
            <div class="detail-row">
              <span>ID</span>
              <strong id="adminDId"></strong>
            </div>

            <div class="detail-row">
              <span>Status</span>
              <span id="adminDStatus" class="status"></span>
            </div>

            <div class="detail-row">
              <span>Title</span>
              <strong id="adminDTitle"></strong>
            </div>

            <div class="detail-row" id="adminHoursRow">
              <span>Hours</span>
              <strong id="adminDHours"></strong>
            </div>

            <div class="detail-row" id="adminPriorityRow">
              <span>Priority</span>
              <span id="adminDPriority" class="priority"></span>
            </div>
          </div>
        </div>
      </div>

      <div id="createUserDrawer" class="drawer">
        <div class="drawer-backdrop" onclick="closeCreateUserDrawer()"></div>

        <div class="drawer-panel">
          <div class="drawer-header">
            <h3>Create User</h3>
            <button class="drawer-close" onclick="closeCreateUserDrawer()">
              ×
            </button>
          </div>

          <form id="createUserForm" class="drawer-form">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="newUserName" required />
            </div>

            <div class="form-group">
              <label>Designation</label>
              <input type="text" id="newUserDesignation" required />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" id="newUserEmail" required />
            </div>

            <div class="form-group">
              <label>User Type</label>

              <select id="newUserType">
                <option value="employee">Employee</option>
                <option value="admin">Admin</option>
              </select>
            </div>

            <div class="form-group password-field">
              <label>Password</label>

              <div class="password-wrapper">
                <input type="password" id="newUserPassword" required />
                <button
                  type="button"
                  class="password-toggle"
                  onclick="togglePassword('newUserPassword')"
                >
                  👁
                </button>
              </div>
            </div>

            <div class="form-group password-field">
              <label>Confirm Password</label>

              <div class="password-wrapper">
                <input type="password" id="confirmUserPassword" required />
                <button
                  type="button"
                  class="password-toggle"
                  onclick="togglePassword('confirmUserPassword')"
                >
                  👁
                </button>
              </div>
            </div>

            <div class="drawer-actions">
              <button
                type="button"
                class="btn-cancel"
                onclick="closeCreateUserDrawer()"
              >
                Cancel
              </button>

              <button type="button" class="btn-submit" id="createUserBtn">
                Create User
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="selected-user-section" id="selectedSection"></div>
    </div>
    <div id="toastContainer"></div>
    <script src="js/admin.js"></script>
  </body>
</html>
