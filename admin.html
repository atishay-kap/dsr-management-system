<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSR Admin Panel</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">DSR</div>
      <div class="user-nav">
        <span>Admin - Atishay</span>
        <button class="logout-btn">Logout</button>
      </div>
    </nav>

    <div class="admin-container">
      <div class="admin-top">
        <h2>Users</h2>
        <button class="action-btn task" onclick="openCreateUser()">
          + Create User
        </button>
      </div>

      <div class="user-grid" id="userGrid"></div>
      <div class="pagination-container" id="pagination"></div>

      <div id="adminDialog" class="admin-dialog">
        <div class="admin-dialog-backdrop" onclick="closeDialog()"></div>

        <div class="admin-dialog-card">
          <div class="dialog-header">
            <h3 id="dialogUserName">User</h3>
            <button class="dialog-close" onclick="closeDialog()">×</button>
          </div>

          <div class="dialog-content" id="dialogContent"></div>
        </div>
      </div>

      <div class="selected-user-section" id="selectedSection"></div>
    </div>

    <script src="js/admin.js"></script>
  </body>
</html>
